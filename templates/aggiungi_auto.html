{% extends 'base.html' %}
{% block content %}
<style>
    body {
        background-color: #0b0b0b !important;
        background-image: 
            linear-gradient(45deg, #111 25%, transparent 25%), 
            linear-gradient(-45deg, #111 25%, transparent 25%), 
            linear-gradient(45deg, transparent 75%, #111 75%), 
            linear-gradient(-45deg, transparent 75%, #111 75%) !important;
        background-size: 8px 8px !important;
        background-position: 0 0, 0 4px, 4px -4px, -4px 0 !important;
        color: #fff;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .form-container {
        max-width: 600px;
        margin: 60px auto;
        background: #151515;
        border-radius: 16px;
        border: 1px solid #2a2a2a;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }

    .form-title {
        font-family: 'Arial Black', sans-serif;
        font-size: 24px;
        font-weight: 900;
        text-transform: uppercase;
        font-style: italic;
        color: #e50914;
        margin-bottom: 30px;
        letter-spacing: -0.5px;
        border-bottom: 1px solid #2a2a2a;
        padding-bottom: 15px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-label {
        display: block;
        font-size: 13px;
        font-weight: bold;
        text-transform: uppercase;
        color: #aaa;
        margin-bottom: 8px;
        letter-spacing: 0.5px;
    }

    .form-input {
        width: 100%;
        background: #222;
        border: 1px solid #444;
        color: #fff;
        padding: 12px 15px;
        border-radius: 8px;
        font-size: 14px;
        box-sizing: border-box;
        transition: all 0.2s ease;
    }

    .form-input:focus {
        border-color: #e50914;
        outline: none;
        background: #282828;
    }

    .form-select {
        width: 100%;
        background: #222;
        border: 1px solid #444;
        color: #fff;
        padding: 12px 15px;
        border-radius: 8px;
        font-size: 14px;
        box-sizing: border-box;
        appearance: none;
        cursor: pointer;
    }

    .form-select:focus {
        border-color: #e50914;
        outline: none;
    }

    .submit-btn {
        background: #e50914;
        color: #fff;
        border: none;
        width: 100%;
        padding: 14px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: background 0.2s ease;
        margin-top: 15px;
    }

    .submit-btn:hover {
        background: #b8070f;
    }
</style>

<div class="form-container">
    <h2 class="form-title">Aggiungi Nuova Auto</h2>
    
    <form action="{{ url_for('aggiungi_auto') }}" method="POST">
        <div class="form-group">
            <label class="form-label">Modello Vettura *</label>
            <input type="text" name="modello" class="form-input" placeholder="Es. Peugeot 9X8" required>
        </div>

        <div class="form-group">
            <label class="form-label">Costruttore</label>
            <input type="text" name="costruttore" class="form-input" placeholder="Es. Peugeot">
        </div>

        <div class="form-group">
            <label class="form-label">Anno di Lancio</label>
            <input type="number" name="anno" class="form-input" value="2026" min="1900" max="2100">
        </div>

        <div class="form-group">
            <label class="form-label">Categoria</label>
            <select name="categoria" class="form-select">
                <option value="Formula 1">Formula 1</option>
                <option value="Rally">Rally</option>
                <option value="Supercar">Supercar</option>
                <option value="Endurance">Endurance</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Incolla Link Foto Vettura da Internet (URL)</label>
            <input type="url" name="immagine_url" class="form-input" placeholder="https://esempio.com/foto-auto.jpg">
        </div>

        <div class="form-group">
            <label class="form-label">Storia / Descrizione Iniziale</label>
            <textarea name="descrizione" class="form-input" rows="6" placeholder="Inserisci qui il racconto e la storia della vettura..."></textarea>
        </div>

        <button type="submit" class="submit-btn">Salva Vettura nel Garage</button>
    </form>
</div>
{% endblock %}
